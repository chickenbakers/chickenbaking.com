<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/logo/icon.svg' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/logo/favicon-32.png' | relative_url }}">
  <link rel="icon" href="{{ '/assets/logo/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/logo/apple-touch-icon.png' | relative_url }}">
  {% seo %}
</head>
<body>
  <div class="container">
    <nav>
      <a href="{{ '/' | relative_url }}">home</a>
      <a href="{{ '/apps' | relative_url }}">apps</a>
      <a href="{{ '/privacy' | relative_url }}">privacy</a>
      <a href="{{ '/support' | relative_url }}">support</a>
    </nav>
    {{ content }}
  </div>
  <footer>
    <div class="container">
      &copy; {{ 'now' | date: '%Y' }} Chicken Baking Ltd Liability Co.
    </div>
  </footer>
</body>
</html>
